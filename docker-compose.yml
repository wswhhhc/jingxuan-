# ============================================================
# 菁选校园作品展示平台 — Docker 部署
# 使用方式：docker compose up -d
# ============================================================

version: "3.8"

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: jingxuan-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-jingxuan123}
      MYSQL_DATABASE: jingxuan
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-jingxuan123}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: jingxuan-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # 后端应用
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend-build
    image: jingxuan-backend:latest
    container_name: jingxuan-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_PASSWORD: ${DB_PASSWORD:-jingxuan123}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      SPRING_PROFILES_ACTIVE: prod
    ports:
      - "8080:8080"
    volumes:
      - uploads:/app/uploads

  # Nginx 反向代理 + 前端静态资源
  nginx:
    image: nginx:alpine
    container_name: jingxuan-nginx
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx-jingxuan.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
volumes:
  mysql-data:
  redis-data:
  uploads:
