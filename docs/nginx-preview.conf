# 学院作品展示平台 — Nginx 精选作品反向代理配置
# 将 server_name 和 proxy_pass 中的端口替换为实际值
#
# 部署步骤：
# 1. 将精选作品部署到对应端口运行
# 2. 将此配置包含到 nginx.conf 的 http 块中
# 3. 执行 nginx -s reload 使配置生效

server {
    listen 80;
    server_name localhost;  # 替换为实际域名或 IP

    # 后端 API 代理
    location /api/ {
        proxy_pass http://127.0.0.1:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 静态文件访问
    location /uploads/ {
        proxy_pass http://127.0.0.1:8080/uploads/;
        proxy_set_header Host $host;
    }

    # 前端静态页面
    location / {
        proxy_pass http://127.0.0.1:5173;
        proxy_set_header Host $host;
    }

    # 精选作品在线体验代理
    # 每个精选作品独占一个 upstream，通过作品 ID 路由
    # 配置示例——作品 ID=5 部署在本机 9003 端口:
    # location /preview/5 {
    #     proxy_pass http://127.0.0.1:9003;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }
    #
    # 作品 ID=8 部署在本机 9004 端口:
    # location /preview/8 {
    #     proxy_pass http://127.0.0.1:9004;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }
}
