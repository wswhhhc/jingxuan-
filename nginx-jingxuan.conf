# Gzip 压缩
gzip on;
gzip_min_length 1k;
gzip_comp_level 3;
gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
gzip_vary on;
gzip_proxied any;

# 反向代理缓存与超时优化
proxy_connect_timeout 30s;
proxy_send_timeout 60s;
proxy_read_timeout 60s;
proxy_buffer_size 8k;
proxy_buffers 8 64k;
proxy_busy_buffers_size 128k;

# 文件描述符上限（与 worker_connections 配合）
# 修改 /etc/nginx/nginx.conf 中的 worker_connections 需手动调整，见下方说明

server {
    listen 80;
    server_name _;

    # ========== 安全响应头 ==========
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), fullscreen=(self)" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; media-src 'self' blob:; frame-src '*'; object-src 'none'; base-uri 'self'; form-action 'self'" always;
    # ===============================

    root /opt/jingxuan/frontend/dist;
    index index.html;

    client_max_body_size 1600m;
    client_body_buffer_size 128k;

    # HTML 不缓存（SPA 需要实时更新）
    location ~* \.html?$ {
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires -1;
    }

    # JS/CSS 使用内容哈希命名，可以长期缓存
    location ~* \.(js|css|json)$ {
        add_header X-Content-Type-Options "nosniff" always;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location /api/file {
        proxy_pass http://127.0.0.1:8080/api/file;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        proxy_pass http://127.0.0.1:8080/uploads/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ===== Novel2Script 反向代理 =====
    location /novel2-api/ {
        rewrite ^/novel2-api/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /novel2/ {
        alias /opt/Novel2Script/Novel2Script/frontend/dist/;
        index index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" text/html;
        try_files $uri $uri/ /novel2/index.html;
    }

    location = /novel2 {
        return 301 /novel2/;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

