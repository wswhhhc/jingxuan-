spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:3306/jingxuan?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowMultiQueries=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 10000
      max-lifetime: 600000
      pool-name: JingxuanPool

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      database: 0

# 生产环境 DeepSeek 审核失败时默认拒绝，避免绕过审核
deepseek:
  fallback: reject

logging:
  level:
    com.jingxuan: info
    com.baomidou: warn
