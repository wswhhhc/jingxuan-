name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master]

jobs:
  # ==========================================
  # 后端：编译 + 单元测试 + 打包
  # ==========================================
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: maven

      - name: Compile
        run: mvn compile -q

      - name: Unit tests
        run: mvn test -Dtest="com.jingxuan.modules.audit.**,com.jingxuan.modules.comment.**,com.jingxuan.modules.dict.**,com.jingxuan.modules.log.**,com.jingxuan.modules.notice.**,com.jingxuan.modules.notification.**,com.jingxuan.modules.publish.**,com.jingxuan.modules.rank.**,com.jingxuan.modules.sensitive.**,com.jingxuan.modules.work.**,com.jingxuan.exception.**"

      - name: Package
        run: mvn package -Dmaven.test.skip=true -q
